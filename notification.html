<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification | Soilpad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
            --primary: #2d5a27; --border: #e5e7eb; --accent: #fbbf24;
        }
        body.dark-mode {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --border: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* --- Header --- */
        header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; padding: 10px 15px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo-box { width: 30px; height: 30px; background: var(--primary); color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        
        .nav-actions { display: flex; gap: 10px; }
        .nav-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- HTML Container --- */
        #htmlframe {
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            min-height: 80vh;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* --- Loading & Popups --- */
        #loadingOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-icon { font-size: 3rem; color: var(--primary); margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }

        .custom-pop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 4000; backdrop-filter: blur(4px); }
        .pop-box { background: var(--card); padding: 30px; border-radius: 24px; text-align: center; max-width: 320px; width: 90%; }
        .pop-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; margin-top: 20px; cursor: pointer; font-weight: 700; width: 100%; }

        footer { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="loading-icon"><i class="fas fa-leaf"></i></div>
    <p>Loading Content...</p>
</div>

<header>
    <nav class="navbar">
        <a href="index" class="logo"><div class="logo-box">S</div> Soilpad</a>
        <div class="nav-actions">
            <button class="nav-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
        </div>
    </nav>
</header>

<div id="htmlframe"></div>

<footer>© 2026 Soilpad. Secure HTML Viewer.</footer>

<div class="custom-pop" id="errorPop">
    <div class="pop-box">
        <i class="fas fa-exclamation-triangle" style="color:#ef4444; font-size: 3rem;"></i>
        <h3 style="margin: 15px 0;">Error</h3>
        <p id="errorMsg">Content not found.</p>
        <button class="pop-btn" onclick="window.location.href='index'">Go Back</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    let fileName = params.get('n') || "index";
    
    // Automatically add .html for fetching, keep URL clean
    const fetchPath = fileName.endsWith('.html') ? fileName : fileName + ".html";
    const REPO_URL = `https://raw.githubusercontent.com/soilpad/contact/main/notification/${fetchPath}`;

    document.addEventListener('DOMContentLoaded', () => {
        if (!fileName) {
            showError("No page name provided in URL.");
            return;
        }
        
        // Clean the URL bar: removes .html if the user typed it manually
        const cleanURL = window.location.origin + window.location.pathname + "?n=" + fileName.replace(/\.html$/i, '');
        window.history.replaceState({}, '', cleanURL);

        fetchHTML();
    });

    async function fetchHTML() {
        const frame = document.getElementById('htmlframe');
        const loader = document.getElementById('loadingOverlay');

        try {
            const response = await fetch(REPO_URL);
            if (!response.ok) throw new Error("File not found");
            
            const htmlContent = await response.text();
            
            // Injected HTML must execute scripts. 
            // Standard innerHTML doesn't run <script> tags, so we use a Range or Iframe approach.
            // For full JS/CSS support, Iframe is safest, but Shadow DOM/Range is faster.
            
            // Using a shadow-like injection for full functionality:
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const blobURL = URL.createObjectURL(blob);
            
            const iframe = document.createElement('iframe');
            iframe.src = blobURL;
            iframe.style.width = "100%";
            iframe.style.height = "80vh";
            iframe.style.border = "none";
            
            frame.appendChild(iframe);
            
            // Hide loader when iframe content is ready
            iframe.onload = () => {
                loader.style.display = 'none';
            };

        } catch (err) {
            showError("Could not load the requested notification from the repository.");
        }
    }

    function showError(msg) {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('errorMsg').innerText = msg;
        document.getElementById('errorPop').style.display = 'flex';
    }

    // Theme Switcher
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.onclick = () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        themeBtn.innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    };

    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
    }
</script>
</body>
</html>
